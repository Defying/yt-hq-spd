<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Quality</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <section>
        <label for="quality">Quality</label>
        <select id="quality" autofocus>
          <option value="highest">Highest available</option>
          <option value="hd4320">8K</option>
          <option value="hd2880">5K</option>
          <option value="hd2160">4K</option>
          <option value="hd1440">1440p</option>
          <option value="hd1080">1080p</option>
          <option value="hd720">720p</option>
          <option value="large">480p</option>
          <option value="medium">360p</option>
          <option value="small">240p</option>
          <option value="tiny">144p</option>
        </select>
      </section>

      <section>
        <div class="label-row">
          <label for="speed">Speed</label>
          <output id="speed-value" for="speed">1.00x</output>
        </div>
        <div class="speed-controls">
          <button id="slower" type="button" title="Slower" aria-label="Decrease speed by 0.05x">-</button>
          <input id="speed" type="range" min="0.25" max="4" step="0.05" aria-label="Playback speed">
          <button id="faster" type="button" title="Faster" aria-label="Increase speed by 0.05x">+</button>
        </div>
        <button id="normal-toggle" class="wide-button" type="button">Use 1.00x</button>
      </section>

      <section class="analysis-panel">
        <div class="label-row">
          <strong>Transcript summary</strong>
          <button id="open-library" class="text-button" type="button">Library</button>
        </div>
        <label for="api-key">OpenAI API key</label>
        <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false">
        <div class="button-row">
          <button id="save-api-key" class="wide-button" type="button">Save key</button>
          <button id="clear-api-key" class="wide-button secondary" type="button">Clear</button>
        </div>
        <button id="analyze-video" class="wide-button primary" type="button">Analyze current video</button>
        <button id="stop-analysis" class="wide-button secondary" type="button">Stop & summarize</button>
        <p class="hint">Records the video audio in real time at 1x, then stores transcript, summary, and sections locally.</p>
      </section>

      <section>
        <div class="label-row">
          <strong>Recent</strong>
          <button id="refresh-history" class="text-button" type="button">Refresh</button>
        </div>
        <div id="history" class="history" aria-live="polite"></div>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
